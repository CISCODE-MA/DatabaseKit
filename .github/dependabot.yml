version: 2
updates:
  # npm dependencies
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
      day: monday
      time: '03:00'
    open-pull-requests-limit: 5
    reviewers:
      - CISCODE-MA/cloud-devops
    assignees:
      - CISCODE-MA/cloud-devops
    labels:
      - 'dependencies'
      - 'npm'
    commit-message:
      prefix: 'chore(deps)'
      include: 'scope'
    pull-request-branch-name:
      separator: '/'
    rebase-strategy: auto
    allow:
      - dependency-type: 'production'
      - dependency-type: 'development'
    ignore:
      # Optional: add dependencies that need manual review here
      # - dependency-name: "@nestjs/*"
      #   versions: [">=12.0.0"]

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
      day: sunday
      time: '03:00'
    reviewers:
      - CISCODE-MA/cloud-devops
    assignees:
      - CISCODE-MA/cloud-devops
    labels:
      - 'dependencies'
      - 'github-actions'
    commit-message:
      prefix: 'ci(deps)'
